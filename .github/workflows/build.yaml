name: Build Fedora 43 KDE ISO

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dev:
        description: "Run as development?"
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    container:
      image: fedora:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y.%m.%d')" >> "$GITHUB_ENV"

      - name: Run build-iso script
        run: bash build-iso

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dev == 'true' }}
        with:
          name: Fedora 43 KDE ${{ env.DATE }}
          path: |
            fedora-kiwi-descriptions/Fedora.x86_64-43.isoaa
            fedora-kiwi-descriptions/Fedora.x86_64-43.isobb
            fedora-kiwi-descriptions/CHECKSUM.txt

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dev == 'false') }}
        with:
          name: Fedora 43 KDE ${{ env.DATE }}
          tag_name: ${{ env.DATE }}
          body_path: CHECKSUMS.txt
          files: |
            Fedora.x86_64-43.isoaa
            Fedora.x86_64-43.isobb
            CHECKSUM.txt